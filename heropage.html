<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Hero Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f7fa;
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px;
            min-height: 100vh;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }

        .hero-text {
            flex: 1;
            padding-right: 20px;
        }

        .hero-text h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero-text p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .hero-text button {
            padding: 10px 20px;
            border: none;
            background: #fff;
            color: #333;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .hero-text button:hover {
            background: #ddd;
        }

        .hero-image {
            flex: 1;
            text-align: center;
        }

        .hero-image img {
            width: 80%;
            max-width: 400px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 30px;
            }

            .hero-text {
                padding-right: 0;
                margin-bottom: 20px;
            }

            .hero-text h1 {
                font-size: 32px;
            }

            .hero-text p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<section class="hero">
    
    <div class="hero-text">
        <h1>Welcome to My Website</h1>
        <p>I am learning web development and building modern responsive websites.</p>
        <button>Get Started</button>
    </div>

    <div class="hero-image">
        <img src="https://via.placeholder.com/400" alt="Hero Image">
    </div>

</section>

</body>
</html>
